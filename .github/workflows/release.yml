name: Release (配布ビルド)

# Windows / macOS / Linux の配布用パッケージを tauri-action でビルドする。
# 手動実行（workflow_dispatch）または v* タグの push で起動。
# 実機ウィンドウの動作確認はローカルPCで行う前提（このジョブはバンドル生成のみ）。

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            label: macOS (Apple Silicon)
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            label: macOS (Intel)
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-latest
            label: Linux (x86_64)
            args: ""
          - platform: windows-latest
            label: Windows (x86_64)
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Tauri Linux 依存を導入
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libsoup-3.0-dev libjavascriptcoregtk-4.1-dev librsvg2-dev \
            libayatana-appindicator3-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Tauri ビルド（バンドル生成）
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}

      - name: 成果物をアップロード
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.label }}
          path: |
            src-tauri/target/release/bundle/**/*
            src-tauri/target/*/release/bundle/**/*
          if-no-files-found: warn
